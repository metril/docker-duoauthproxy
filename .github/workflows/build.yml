name: Build and Push Duo Auth Proxy

on:
  push:
    branches:
      - master
      - main
  schedule:
    # Run weekly on Mondays at 06:00 UTC to catch new Duo releases
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      duo_version:
        description: 'Specific Duo Auth Proxy version to build (leave empty for latest)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  detect-version:
    name: Detect Latest Duo Version
    runs-on: ubuntu-latest
    outputs:
      duo_version: ${{ steps.get-version.outputs.version }}
      should_build: ${{ steps.check-existing.outputs.should_build }}
    steps:
      - name: Determine version to build
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.duo_version }}" ]; then
            VERSION="${{ github.event.inputs.duo_version }}"
            echo "Using manually specified version: $VERSION"
          else
            HEADER=$(curl -sI -L "https://dl.duosecurity.com/duoauthproxy-latest-src.tgz" | grep -i content-disposition)
            VERSION=$(echo "$HEADER" | sed -n 's/.*duoauthproxy-\([0-9][0-9.]*\)-src\.tgz.*/\1/p')
            if [ -z "$VERSION" ]; then
              echo "ERROR: Could not determine Duo Auth Proxy version from download URL"
              exit 1
            fi
            echo "Detected latest version: $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already exists in registry
        id: check-existing
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          if docker manifest inspect "${IMAGE_LOWER}:${VERSION}" > /dev/null 2>&1; then
            echo "Image ${IMAGE_LOWER}:${VERSION} already exists"
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Image ${IMAGE_LOWER}:${VERSION} does not exist, will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push Image
    needs: detect-version
    if: needs.detect-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.duo_version }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=duoauthproxy
            org.opencontainers.image.description=Duo Authentication Proxy v${{ needs.detect-version.outputs.duo_version }}
            org.opencontainers.image.version=${{ needs.detect-version.outputs.duo_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DUO_VERSION=${{ needs.detect-version.outputs.duo_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: [detect-version, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect-version.outputs.duo_version }}
        run: |
          TAG="v${VERSION}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" \
              --title "Duo Auth Proxy ${VERSION}" \
              --notes "## Duo Authentication Proxy ${VERSION}

          Container image: \`ghcr.io/metril/docker-duoauthproxy:${VERSION}\`

          \`\`\`bash
          docker pull ghcr.io/metril/docker-duoauthproxy:${VERSION}
          \`\`\`"
          fi
